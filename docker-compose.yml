# Docker Compose for Code Profiler Environment - HF Spaces Deployment
# =====================================================================

services:
  code-profiler-env:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-profiler-openenv
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    volumes:
      - ./profiles:/app/profiles
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
