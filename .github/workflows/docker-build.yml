name: Docker Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t code-profiler-env:latest .

      - name: Verify Docker build
        run: |
          docker inspect code-profiler-env:latest
          echo "Docker build successful!"

  validate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate Python syntax
        run: |
          python -m py_compile environments/code_profiler_env/server/app.py
          python -m py_compile environments/code_profiler_env/models.py
          python -m py_compile environments/code_profiler_env/rl_components.py
          python -m py_compile environments/code_profiler_env/report_generator.py
          python -m py_compile environments/code_profiler_env/server/start_apis.py
          python -m py_compile environments/code_profiler_env/server/profile_runner.py
          echo "Python validation complete!"

      - name: Validate OpenEnv spec
        run: |
          python -c "
            import yaml
            with open('environments/code_profiler_env/openenv.yaml') as f:
                config = yaml.safe_load(f)
            assert 'tasks' in config
            assert len(config['tasks']) >= 3
            print(f'Validated {len(config[\"tasks\"])} tasks')
            print('OpenEnv spec is valid!')
          "

      - name: Validate inference.py format
        run: |
          python -c "
            import ast
            with open('inference.py') as f:
                code = f.read()
            tree = ast.parse(code)
            print('inference.py syntax is valid!')
          "

  test-endpoints:
    needs: build
    runs-on: ubuntu-latest
    container:
      image: code-profiler-env:latest
      options: --privileged
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: /workspace

      - name: Wait for server startup
        run: |
          sleep 5

      - name: Test endpoints
        run: |
          echo 'Testing /health endpoint...'
          curl -s http://localhost:7860/health | grep -q 'healthy' && echo 'Health OK' || echo 'Health FAILED'
          
          echo 'Testing /reset endpoint...'
          curl -s -X POST http://localhost:7860/reset -H 'Content-Type: application/json' -d '{"language": "python"}' | grep -q 'observation' && echo 'Reset OK' || echo 'Reset FAILED'
          
          echo 'Testing /state endpoint...'
          curl -s http://localhost:7860/state | grep -q 'episode_id' && echo 'State OK' || echo 'State FAILED'
          
          echo 'Testing /tasks endpoint...'
          curl -s http://localhost:7860/tasks | grep -q 'task_id' && echo 'Tasks OK' || echo 'Tasks FAILED'

  deploy:
    needs: [build, validate, test-endpoints]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/code-profiler-env:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/code-profiler-env:latest
          echo "Image pushed successfully!"
